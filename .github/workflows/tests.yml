name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q src scripts

      - name: Run tests
        run: pytest -q

      - name: Generate sample data
        run: |
          python scripts/make_sample_data.py \
            --rows 3500 \
            --out data/processed/sample_BTCUSDT_5m.csv

      - name: Run no-future-leak smoke check
        run: |
          python scripts/run_no_future_leak_check.py \
            --data data/processed/sample_BTCUSDT_5m.csv \
            --strategy amlrx \
            --config configs/amlrx_v0_1.yaml \
            --warmup-bars 250

      - name: Run data quality smoke check
        run: |
          python scripts/run_data_quality.py \
            --data data/processed/sample_BTCUSDT_5m.csv \
            --symbol BTCUSDT \
            --timeframe 5m \
            --out reports/data_quality/sample_BTCUSDT_5m.json

      - name: Run export schema smoke check
        run: |
          python scripts/run_export_schema_check.py \
            --csv data/pine_exports/example_export_contract.csv \
            --out reports/parity/example_export_schema.json
